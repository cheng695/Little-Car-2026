robot:
  name: LittleCar2026
  target: default_car
  chassis_type: differential_drive

geometry:
  chassis:
    wheel_radius_m: 0.022
    track_width_m: 0.13
    half_track_m: 0.065

communication:
  uart:
    debug:
      logical_id: Debug
      handle: huart1
      baudrate: 115200
      tx_mode: dma
      rx_mode: idle_dma
      rx_buffer_size: 44
      rx_callback: Debug_OnUartRx


messages:
  RemoteData:
    publisher: RemoteDriver
    fields:
      target_forward: float
      target_rotation: float
    subscribers:
      - Chassis_RemoteData

  MotorFeedback:
    publisher: MotorDriver
    fields:
      motors:
        count: 4
        fields:
          speed_rads: float
          speed_rpm: float
          angle_rad: float
          angle_deg: float
    subscribers:
      - Chassis_MotorFeedback
    
  ChassisTarget:
    publisher: TargetDriver
    fields:
      target_forward: float
      target_rotation: float
    subscribers:
      - Chassis_Motortarget

  ChassisOutput:
    publisher: OutputDriver
    fields:
      motors:
        count: 4
        fields:
          out: float
    subscribers:
      - Chassis_MotorOutPut
  
  ChassisIK_msg:
    publisher: IKDriver
    fields:
      motors:
        count: 4
        fields:
          target: float
    subscribers:
      - ChassisIK_Target

control:
  chassis_ik:
    type: differential_drive
    config:
      wheel_radius_m: 0.022
      half_track_m: 0.065

  filters:
    chassis_target_low_pass:
      array: true
      array_name: chassis_target
      array_index: 0
      type: low_pass
      alpha: 0.2
      initial_output: 0.0

    chassis_rotation_low_pass:
      array: true
      array_name: chassis_target
      array_index: 1
      type: low_pass
      alpha: 0.2
      initial_output: 0.0

    chassis_target_forward_td:
      array: true
      array_name: chassis_target_tracking
      array_index: 0
      type: td
      r: 50.0
      h: 0.001
      initial_v1: 0.0
      initial_v2: 0.0

    chassis_target_rotation_td:
      array: true
      array_name: chassis_target_tracking
      array_index: 1
      type: td
      r: 50.0
      h: 0.001
      initial_v1: 0.0
      initial_v2: 0.0

  feedforwards:
    chassis_forward_acc:
      type: acceleration
      k_acc: 0.0
      control_cycle: 0.001
      initial_target: 0.0

    chassis_rotation_friction:
      type: friction
      friction_value: 0.0

  observers:
    chassis_disturbance_ude:
      type: ude
      a: 0.0
      b: 1.0
      initial_feedback: 0.0

  pid:
    chassis_left_front_speed: 
      array: true
      array_name: chassis_speed
      array_index: 0
      kp: 150.0
      ki: 0.0
      kd: 0.0
      output_limit: 1000
      integral_limit: 500
      integral_separation_threshold: 10.0
      R: 50.0
      T: 0.001

    chassis_right_front_speed:
      array: true
      array_name: chassis_speed
      array_index: 2
      kp: 150.0
      ki: 0.0
      kd: 0.0
      output_limit: 1000
      integral_limit: 1000
      integral_separation_threshold: 100.0
      R: 50.0
      T: 0.001

    chassis_left_back_speed: 
      array: true
      array_name: chassis_speed
      array_index: 1
      kp: 150.0
      ki: 0.0
      kd: 0.0
      output_limit: 1000
      integral_limit: 1000
      integral_separation_threshold: 100.0
      R: 50.0
      T: 0.001

    chassis_right_back_speed: 
      array: true
      array_name: chassis_speed
      array_index: 3
      kp: 150.0
      ki: 0.0
      kd: 0.0
      output_limit: 1000
      integral_limit: 1000
      integral_separation_threshold: 100.0
      R: 50.0
      T: 0.001

hardware:
  motors:
    left_front:
      array: true
      array_name: chassis
      array_index: 0
      interface: M1
      ik_index: 0
      side: left
      position: front
      reduction_ratio: 1.0
      pwm_a: { timer: htim8, channel: TIM_CHANNEL_2, gpio: PC7 }
      pwm_b: { timer: htim8, channel: TIM_CHANNEL_1, gpio: PC6 }
      encoder: left_front_encoder
      speed_pid: chassis_left_front_speed

    right_front:
      array: true
      array_name: chassis
      array_index: 2
      interface: M3
      ik_index: 2
      side: right
      position: front
      reduction_ratio: 1.0
      pwm_a: { timer: htim1, channel: TIM_CHANNEL_2, gpio: PE11 }
      pwm_b: { timer: htim1, channel: TIM_CHANNEL_1, gpio: PE9 }
      encoder: right_front_encoder
      speed_pid: chassis_right_front_speed

    left_back:
      array: true
      array_name: chassis
      array_index: 1
      interface: M2
      ik_index: 1
      side: left
      position: back
      reduction_ratio: 1.0
      pwm_a: { timer: htim8, channel: TIM_CHANNEL_4, gpio: PC9 }
      pwm_b: { timer: htim8, channel: TIM_CHANNEL_3, gpio: PC8 }
      encoder: left_back_encoder
      speed_pid: chassis_left_back_speed

    right_back:
      array: true
      array_name: chassis
      array_index: 3
      interface: M4
      ik_index: 3
      side: right
      position: back
      reduction_ratio: 1.0
      pwm_a: { timer: htim1, channel: TIM_CHANNEL_4, gpio: PE14 }
      pwm_b: { timer: htim1, channel: TIM_CHANNEL_3, gpio: PE13 }
      encoder: right_back_encoder
      speed_pid: chassis_right_back_speed

  encoders:
    left_front_encoder:
      array: true
      array_name: chassis
      array_index: 0
      interface: M1
      timer: htim4
      cpr: 1040

    left_back_encoder:
      array: true
      array_name: chassis
      array_index: 2
      interface: M2
      timer: htim2
      cpr: 1040

    right_front_encoder:
      array: true
      array_name: chassis
      array_index: 1
      interface: M3
      timer: htim5
      cpr: 1040

    right_back_encoder:
      array: true
      array_name: chassis
      array_index: 3
      interface: M4
      timer: htim3
      cpr: 1040
  
  buttons:
    key1:
      pin: PG3
      mode: exti
      trigger: rising
      pull: none
      irq: EXTI3_IRQn
      active_low: true
    key2:
      pin: PG4
      mode: exti
      trigger: rising
      pull: none
      irq: EXTI4_IRQn
      active_low: true
    key3:
      pin: PG5
      mode: exti
      trigger: rising
      pull: none
      irq: EXTI9_5_IRQn
      active_low: true

  buzzer:
    pin: PG12
    mode: output
    pull: none
    speed: low
    active_low: false

  oled:
    type: ssd1306_i2c
    i2c_handle: hi2c1
    address: 0x3C
    width: 128
    height: 64

  leds:
    lrgb_r: { pin: PG1, mode: output, pull: none, speed: low, active_low: false }
    lrgb_g: { pin: PE7, mode: output, pull: none, speed: low, active_low: false }
    lrgb_b: { pin: PG2, mode: output, pull: none, speed: low, active_low: false }
    rrgb_r: { pin: PE2, mode: output, pull: none, speed: low, active_low: false }
    rrgb_g: { pin: PE3, mode: output, pull: none, speed: low, active_low: false }
    rrgb_b: { pin: PE4, mode: output, pull: none, speed: low, active_low: false }
